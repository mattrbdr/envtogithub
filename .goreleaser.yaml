version: 2

project_name: etg

builds:
  - id: etg
    dir: packages/cli
    main: ./cmd/etg
    binary: etg
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  draft: false
  prerelease: auto

brews:
  - name: etg
    repository:
      owner: mattrbdr
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/mattrbdr/envtogithub"
    description: "Sync local environment files with GitHub environment secrets"
    license: "MIT"
    install: |-
      bin.install "etg"
    test: |
      system "#{bin}/etg", "help"
    skip_upload: auto
